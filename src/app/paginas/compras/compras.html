<div class="checkout-container">

<h1>

Finalizar Compra

</h1>

<form

(ngSubmit)="comprar()"

#formCompra="ngForm"

>

<div class="form-group">

<label>

Nombre

</label>

<input

type="text"

[(ngModel)]="nombre"

name="nombre"

required

>

</div>

<div class="form-group">

<label>

Apellido

</label>

<input

type="text"

[(ngModel)]="apellido"

name="apellido"

required

>

</div>

<div class="form-group">

<label>

Email

</label>

<input

type="email"

[(ngModel)]="email"

name="email"

required

>

</div>

<div class="form-group">

<label>

Teléfono

</label>

<input

type="text"

[(ngModel)]="telefono"

name="telefono"

required

>

</div>

<div class="form-group">

<label>

Dirección

</label>

<input

type="text"

[(ngModel)]="direccion"

name="direccion"

required

>

</div>

<div class="form-group">

<label>

Ciudad

</label>

<input

type="text"

[(ngModel)]="ciudad"

name="ciudad"

required

>

</div>

<div class="form-group">

<label>

Método de Pago

</label>

<select

[(ngModel)]="metodoPago"

name="metodoPago"

required

>

<option>

Tarjeta

</option>

<option>

Mercado Pago

</option>

<option>

Transferencia

</option>

</select>

</div>

<button

type="submit"

class="buy-btn"

>

Confirmar Compra

</button>

</form>

</div>
