<div class="container mt-5">
  <div class="row">

    <div *ngFor="let i of infoIndumentaria" 
         class="col-lg-3 col-md-6 col-sm-12 mb-4">

      <div class="card h-100">

        <img [src]="i.img" class="card-img-top" [alt]="i.alt">

        <div class="card-body d-flex flex-column">

          <h5 class="card-title">{{i.titulo}}</h5>

          <p class="card-text">
            {{i.descripcion}}
          </p>

          <p class="card-text">
            {{i.descripcion2}}
          </p>

          <p class="price">
            ${{i.precio}}
          </p>

          <a href="#" class="btn btn-primary mt-auto">
            Añadir al carrito
          </a>

        </div>
      </div>

    </div>

  </div>
</div>
