<div class="container py-5">

    <h1 class="cart-title">
        🛒 Mi Carrito
    </h1>

    <div class="cart-container">

        @if(carritoProductos.length > 0){

            @for(productos of carritoProductos; track productos.id){

                <div class="cart-item">

                    <div class="item-image">

                        <img
                            [src]="productos.imagen"
                            [alt]="productos.nombre"
                            class="product-img"
                        >

                    </div>

                    <div class="item-name">

                        {{ productos.nombre }}

                    </div>

                    <div class="item-quantity">

                        <button
                            class="qty-btn"
                            (click)="disminuirCantidad(productos)"
                        >
                            -
                        </button>

                        <span class="qty-number">

                            {{ productos.cantidad }}

                        </span>

                        <button
                            class="qty-btn"
                            (click)="aumentarCantidad(productos)"
                        >
                            +
                        </button>

                    </div>

                    <div class="item-price">

                        $ {{ productos.precio * productos.cantidad }}

                    </div>

                </div>

            }

        } @else {

            <div class="empty-cart">

                <h3>
                    Tu carrito está vacío
                </h3>

            </div>

        }

    </div>

</div>
