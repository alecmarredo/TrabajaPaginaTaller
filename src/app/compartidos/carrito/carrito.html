<div class="container my-5">

    <h1 class="cart-title mb-4">

                </tr>

            </thead>

            <!-- BODY -->
            <tbody>

                <!-- ITEM -->
                <tr>

                    <!-- Imagen -->
                    <td>
                        <img
                            src="assets/IMG_5312.jpeg"

                            class="cart-img"
                        >
                    </td>

                    <!-- Nombre -->
                    <td class="product-name">
                        Buzo Armani Exchange Negro
                    </td>

                    <!-- Cantidad -->
                    <td>

                        <div class="quantity-box">

                            <button class="qty-btn">

                            <button class="qty-btn">

                    <td class="price">

                </tr>

                <!-- ITEM -->
                <tr>

                    <td>
                        <img
                            src="assets/IMG_5313.jpeg"

                    <td class="product-name">
                        Campera Adidas Premium
                    </td>

                    <td>

                        <div class="quantity-box">

                            <button class="qty-btn">
                                -
                            </button>

                            <span>
                                2
                            </span>

                            <button class="qty-btn">
                                +
                            </button>

                        </div>

                    </td>

                    <td class="price">
                        $59.999
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <!-- TOTAL -->

    <div class="cart-total">

        <h2>
            Total: $159.997
        </h2>

        <button class="checkout-btn">
            Finalizar compra
        </button>

    </div>

</div>
